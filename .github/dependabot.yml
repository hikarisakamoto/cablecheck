version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci"
# No gomod ecosystem: the project is standard-library-only by contract
# (go.mod has zero requires and there is no go.sum).
