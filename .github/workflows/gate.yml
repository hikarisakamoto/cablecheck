name: gate

# Reusable quality gate: the single source of "green" shared by pr.yml,
# main.yml and release.yml. It runs `make check`, nothing else.
on:
  workflow_call:

permissions:
  contents: read

jobs:
  check:
    name: make check
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26.x'
          check-latest: false
          cache: false
      # make check = fmt-check + vet + tidy-check + test + test-race + build.
      # test-race self-sets CGO_ENABLED=1; ubuntu-24.04 ships gcc, so -race links.
      # Do NOT set a job-level CGO_ENABLED: it would leak into build/dist and
      # break the static, dependency-free binary the project requires.
      - name: make check
        run: make check
